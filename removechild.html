<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remover</title>
</head>
<body>
    <ul id="lista">
        <li class= "item">Item 01</li>
        <li class= "item">Item 02</li>
        <li class= "item">Item 03</li>
    </ul>   
</body>
<script>
    let lista = document.getElementById("lista")
    let remover = document.querySelectorAll(".item")
    lista.removeChild(remover[0])
</script>
</html>
