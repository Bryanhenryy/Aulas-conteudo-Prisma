<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="imc.css">
</head>
<body>
    <form id="form-imc">
    <label for="peso">Peso(KG):</label> <br>
    <input type="number" id="peso" step="0.1" required placeholder="Ex: 70.5"><br><br>

    <label for="altura">Altura(cm):</label> <br>
    <input type="number" id="altura" step="0.1" required placeholder="Ex: 175">
    
    <button type="button" onclick="calcularIMC()">Calcular</button>
    </form>

<h3>Resultado:</h3>
<textarea rows="4" cols="30" id="resultado" readonly placeholder="O resultado aparecerá aqui..."></textarea>
<script src="imc.js"></script>
</body>
</html>
