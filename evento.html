<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento</title>
</head>
<body>
    <h1 id="titulo">
        Esse é o título da página
    </h1>
    
</body>
<script>
    let titulo = document.getElementById("titulo")
    titulo.addEventListener("click", () =>{
        titulo.innerText = "Titulo escrito por JS"
    })
</script>
</html>
