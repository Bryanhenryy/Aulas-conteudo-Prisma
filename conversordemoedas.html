<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>
    <link rel="stylesheet" href="conversordemoedas.css">
</head>
<body>

    <div class="card-conversor">
        <h2>Conversor de Moedas</h2>
        
        <div class="campo-grupo">
            <label for="valorBrl">Valor em Reais (BRL):</label>
            <input type="number" id="valorBrl" placeholder="R$ 0,00" min="0" step="0.01">
        </div>

        <div class="campo-grupo">
            <label for="moedaDestino">Converter para:</label>
            <select id="moedaDestino">
                <option value="USD">Dólar americano (USD)</option>
                <option value="EUR">Euro (EUR)</option>
                <option value="GBP">Libra esterlina (GBP)</option>
            </select>
        </div>

        <button id="btnConverter">Converter</button>

        <div class="container-resultado">
            <span class="label-resultado">Resultado convertido:</span>
            <div id="resultadoVal">--</div>
        </div>
    </div>

    <script src="conversordemoedas.js"></script>
</body>
</html>
